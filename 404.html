<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Georges River Libraries Babel Fish</title>
    <script type="text/javascript">
      // Redirect to the hash-based URL for SPA routing on GitHub Pages
      var l = window.location;
      var basePath = '/babel-fish';
      var currentPath = l.pathname;

      if (currentPath.startsWith(basePath + '/') && currentPath !== basePath + '/') {
        var route = currentPath.slice(basePath.length);
        window.location.replace(basePath + '/#' + route + l.search + l.hash);
      } else {
        window.location.replace(basePath + '/');
      }
    </script>
  </head>
  <body>
    <p>Redirecting to Babel Fish App...</p>
  </body>
</html>
