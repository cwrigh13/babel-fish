<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Georges River Libraries Babel Fish</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current URL and converts the path, query string and hash
      // into a route that the React Router can handle when the page loads
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <meta http-equiv="refresh" content="0;URL='/babel-fish'">
  </head>
  <body>
    <p>Redirecting to <a href="/babel-fish">Babel Fish App</a>...</p>
  </body>
</html>
